name: Validate CI/CD Templates

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    shell: powershell

jobs:
  # ============================================================
  # Job 1: Validate YAML template files
  # ============================================================
  validate-yaml:
    name: Validate YAML Templates
    runs-on: [self-hosted, Windows, X64, kho-project]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Python version
        run: python --version

      - name: Install PyYAML if missing
        run: |
          python -c "import yaml" 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Installing PyYAML..."
            pip install pyyaml --quiet
          } else {
            Write-Host "PyYAML already available"
          }

      - name: Validate catalog/templates.yml
        run: |
          $catalogFile = "catalog\templates.yml"
          if (Test-Path $catalogFile) {
            python -c "import yaml; yaml.safe_load(open('$catalogFile', encoding='utf-8').read()); print('OK: catalog/templates.yml')"
            if ($LASTEXITCODE -ne 0) {
              Write-Error "catalog/templates.yml has YAML syntax errors"
              exit 1
            }
          } else {
            Write-Error "catalog/templates.yml not found"
            exit 1
          }

      - name: Validate all .yml files in templates/
        run: |
          Write-Host "Scanning YAML files in templates/..."
          $yamlFiles = Get-ChildItem -Path "templates" -Recurse -Include "*.yml","*.yaml" -ErrorAction SilentlyContinue

          if ($null -eq $yamlFiles -or $yamlFiles.Count -eq 0) {
            Write-Host "No .yml files found in templates/ (only .example files)"
          } else {
            $errors = 0
            foreach ($f in $yamlFiles) {
              $relPath = $f.FullName.Replace((Get-Location).Path + "\", "")
              $result = python -c "import yaml; yaml.safe_load(open(r'$($f.FullName)', encoding='utf-8').read())" 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "  PASS: $relPath"
              } else {
                Write-Host "  FAIL: $relPath - $result"
                $errors++
              }
            }
            if ($errors -gt 0) {
              Write-Error "$errors YAML file(s) have syntax errors"
              exit 1
            }
          }
          Write-Host "YAML validation complete: 0 errors"

      - name: Validate .yml.example files (non-empty check)
        run: |
          Write-Host "Scanning .yml.example files..."
          $exFiles = Get-ChildItem -Path "templates" -Recurse -Include "*.yml.example","*.yaml.example" -ErrorAction SilentlyContinue
          $count = if ($null -eq $exFiles) { 0 } else { $exFiles.Count }
          $empty = 0
          if ($count -gt 0) {
            foreach ($f in $exFiles) {
              $content = Get-Content $f.FullName -Raw -ErrorAction SilentlyContinue
              if ($null -eq $content -or $content.Trim().Length -eq 0) {
                Write-Host "  WARNING empty: $($f.Name)"
                $empty++
              } else {
                Write-Host "  OK: $($f.Name) ($($content.Length) bytes)"
              }
            }
          }
          Write-Host "Found $count example files, $empty empty"

  # ============================================================
  # Job 2: Validate Shell scripts and file encoding
  # ============================================================
  validate-files:
    name: Validate Files and Encoding
    runs-on: [self-hosted, Windows, X64, kho-project]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List shell script files
        run: |
          Write-Host "Shell script files in templates/:"
          $shFiles = Get-ChildItem -Path "templates" -Recurse -Include "*.sh","*.sh.example" -ErrorAction SilentlyContinue
          $count = if ($null -eq $shFiles) { 0 } else { $shFiles.Count }
          if ($count -gt 0) {
            foreach ($f in $shFiles) {
              $relPath = $f.FullName.Replace((Get-Location).Path + "\", "")
              Write-Host "  $relPath ($($f.Length) bytes)"
            }
          } else {
            Write-Host "  No shell files found"
          }
          Write-Host "Total: $count shell files"

      - name: Check file encoding (UTF-8)
        run: |
          Write-Host "Checking file encodings in templates/..."
          $allFiles = Get-ChildItem -Path "templates" -Recurse -File -ErrorAction SilentlyContinue |
                      Where-Object { $_.Extension -in ".yml",".yaml",".sh",".conf",".md",".json",".txt" }

          $errors = 0
          foreach ($f in $allFiles) {
            try {
              $null = Get-Content $f.FullName -Encoding UTF8 -ErrorAction Stop
              Write-Host "  OK: $($f.Name)"
            } catch {
              Write-Host "  WARNING encoding issue: $($f.Name)"
              $errors++
            }
          }
          Write-Host "Encoding check done. Issues: $errors"

      - name: Validate Jenkinsfile examples
        run: |
          Write-Host "Jenkinsfile examples in templates/jenkins/:"
          $jenkinsFiles = Get-ChildItem -Path "templates\jenkins" -Recurse -Include "Jenkinsfile*","*.jenkinsfile" -ErrorAction SilentlyContinue
          $count = if ($null -eq $jenkinsFiles) { 0 } else { $jenkinsFiles.Count }
          Write-Host "Found: $count Jenkinsfile(s)"

  # ============================================================
  # Job 3: Catalog and structure validation
  # ============================================================
  validate-catalog:
    name: Validate Template Catalog
    runs-on: [self-hosted, Windows, X64, kho-project]
    needs: [validate-yaml]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required directories exist
        run: |
          $required = @("templates", "catalog", "docs")
          $missing = 0
          foreach ($dir in $required) {
            if (Test-Path $dir) {
              Write-Host "  OK: $dir/"
            } else {
              Write-Host "  MISSING: $dir/"
              $missing++
            }
          }
          if ($missing -gt 0) {
            Write-Error "$missing required directories missing"
            exit 1
          }

      - name: Count templates by category
        run: |
          Write-Host "Template Statistics:"
          Write-Host "-------------------"

          $categories = @("github-actions", "gitlab-ci", "jenkins", "docker", "kubernetes", "shared")
          $total = 0
          foreach ($cat in $categories) {
            $path = "templates\$cat"
            if (Test-Path $path) {
              $count = (Get-ChildItem $path -Recurse -File).Count
              Write-Host "  $cat`: $count files"
              $total += $count
            } else {
              Write-Host "  $cat`: NOT FOUND"
            }
          }
          Write-Host ""
          Write-Host "  Total: $total template files"

      - name: Validate catalog references
        run: |
          Write-Host "Validating catalog file references..."
          $catalogPath = "catalog\templates.yml"
          if (-not (Test-Path $catalogPath)) {
            Write-Error "catalog/templates.yml not found"
            exit 1
          }
          $content = Get-Content $catalogPath -Raw -Encoding utf8
          $lines = $content -split "`n"
          $fileLines = $lines | Where-Object { $_ -match '^\s*file:\s*' }
          $missing = 0
          $checked = 0
          foreach ($line in $fileLines) {
            $filePath = ($line -replace '^\s*file:\s*', '').Trim().Trim('"').Trim("'")
            if ($filePath -and $filePath -ne '') {
              $checked++
              if (-not (Test-Path $filePath)) {
                Write-Host "  MISSING: $filePath"
                $missing++
              } else {
                Write-Host "  OK: $filePath"
              }
            }
          }
          if ($missing -gt 0) {
            Write-Error "Catalog validation failed: $missing of $checked referenced file(s) are missing"
            exit 1
          }
          Write-Host "OK: All $checked catalog file references verified"


      - name: Summary
        run: |
          Write-Host ""
          Write-Host "============================================"
          Write-Host "  Template Validation PASSED"
          Write-Host "  Runner: kho-local-machine (Windows)"
          Write-Host "  Repo:   devops-ci-cd-templates"
          Write-Host "============================================"

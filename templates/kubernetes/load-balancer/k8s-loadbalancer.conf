# ==============================================================================
# k8s-loadbalancer.conf
# Cau hinh Nginx Load Balancer cho cum Kubernetes
# Phan phoi traffic den cac node qua Ingress Nginx NodePort (30080)
#
# Cach su dung:
#   1. Copy file nay vao /etc/nginx/sites-available/
#      sudo cp k8s-loadbalancer.conf /etc/nginx/sites-available/k8s-loadbalancer
#
#   2. Tao symlink
#      sudo ln -s /etc/nginx/sites-available/k8s-loadbalancer /etc/nginx/sites-enabled/k8s-loadbalancer
#
#   3. Kiem tra cau hinh
#      sudo nginx -t
#
#   4. Reload Nginx
#      sudo systemctl reload nginx
# ==============================================================================

# Danh sach cac node Kubernetes
# Port 30080 la NodePort cua Ingress Nginx (cau hinh trong ingress-nginx values.yaml)
upstream my_servers {
    server 192.168.1.111:30080;
    server 192.168.1.112:30080;
    server 192.168.1.113:30080;
}

server {
    listen 80;

    location / {
        proxy_pass http://my_servers;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
